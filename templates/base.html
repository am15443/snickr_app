<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Snickr{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1d21;
      --sidebar:   #19171d;
      --sidebar-w: 260px;
      --panel:     #222529;
      --border:    #383838;
      --accent:    #611f69;
      --accent2:   #4a154b;
      --highlight: #1164a3;
      --text:      #d1d2d3;
      --text-dim:  #8a8a8a;
      --text-head: #ffffff;
      --green:     #2bac76;
      --red:       #e8464a;
      --msg-hover: #2a2d31;
      --input-bg:  #2f3136;
      --radius:    6px;
      --font:      'IBM Plex Sans', sans-serif;
      --mono:      'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; width: 100%; }
    body { height: 100%; width: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 15px;
    }

    a { color: inherit; text-decoration: none; }

    /* ---- Sidebar ---- */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-workspace-name {
      font-weight: 600;
      font-size: 16px;
      color: var(--text-head);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-user {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .sidebar-section {
      padding: 16px 0 4px;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 0 16px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
      font-size: 14px;
      color: var(--text-dim);
    }

    .sidebar-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .sidebar-item.active { background: var(--highlight); color: #fff; }

    .sidebar-item .ch-icon {
      font-size: 16px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-link {
      font-size: 13px;
      color: var(--text-dim);
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.1s;
    }
    .sidebar-link:hover { color: var(--text); }

    /* ---- Main area ---- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-weight: 600;
      font-size: 16px;
      color: var(--text-head);
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ---- Flash messages ---- */
    .flash-list {
      list-style: none;
      margin-bottom: 16px;
    }

    .flash {
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .flash.error   { background: rgba(232,70,74,0.15); border: 1px solid var(--red); color: #f28b8d; }
    .flash.success { background: rgba(43,172,118,0.15); border: 1px solid var(--green); color: #5dd9a4; }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .btn-primary  { background: var(--highlight); color: #fff; }
    .btn-accent   { background: var(--accent); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .btn-sm       { padding: 5px 12px; font-size: 13px; }
    .btn-danger   { background: var(--red); color: #fff; }

    /* ---- Forms ---- */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

    input[type=text], input[type=email], input[type=password], textarea, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--highlight); }
    select option { background: var(--panel); }

    /* ---- Cards ---- */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-head);
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ---- Badge ---- */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-public  { background: rgba(17,100,163,0.25); color: #6db3f2; }
    .badge-private { background: rgba(97,31,105,0.25);  color: #c9a7d0; }
    .badge-direct  { background: rgba(43,172,118,0.2);  color: #5dd9a4; }

    /* ---- Auth pages ---- */
    .auth-wrap {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(97,31,105,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(17,100,163,0.1) 0%, transparent 50%);
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px;
    }

    .auth-logo {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-head);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .auth-logo span { color: #c9a7d0; }

    .auth-sub {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    .auth-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }
    .auth-footer a { color: #6db3f2; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ---- Workspace grid ---- */
    .ws-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .ws-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ws-card:hover { border-color: var(--highlight); transform: translateY(-1px); }

    .ws-card-name { font-size: 16px; font-weight: 600; color: var(--text-head); }
    .ws-card-desc { font-size: 13px; color: var(--text-dim); }
    .ws-card-badge { margin-top: 8px; align-self: flex-start; }

    /* ---- Invite card ---- */
    .invite-card {
      background: rgba(17,100,163,0.1);
      border: 1px solid rgba(17,100,163,0.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .invite-info { font-size: 14px; }
    .invite-name { font-weight: 600; color: var(--text-head); }
    .invite-from { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
